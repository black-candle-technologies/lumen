name: Milestone 3 Linux Sandbox

on:
  pull_request:
    paths:
      - ".github/workflows/milestone3-linux-sandbox.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/lumen-core/**"
      - "crates/lumen-extension-sdk/**"
      - "crates/lumen-integrations/**"
      - "scripts/verify-linux-plugin-sandbox.sh"
  push:
    branches:
      - "feat/milestone-3-extension-runtime"
    paths:
      - ".github/workflows/milestone3-linux-sandbox.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/lumen-core/**"
      - "crates/lumen-extension-sdk/**"
      - "crates/lumen-integrations/**"
      - "scripts/verify-linux-plugin-sandbox.sh"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-plugin-sandbox:
    name: Linux plugin sandbox
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Linux plugin sandbox
        run: |
          docker run --rm --privileged \
            --volume "$PWD:/workspace" \
            --workdir /workspace \
            --env CARGO_INCREMENTAL=0 \
            --env CARGO_TARGET_DIR=/tmp/lumen-target \
            rust:slim \
            bash -lc 'export PATH="/usr/local/cargo/bin:$PATH"; apt-get update; apt-get install -y --no-install-recommends bubblewrap ca-certificates pkg-config; scripts/verify-linux-plugin-sandbox.sh'
