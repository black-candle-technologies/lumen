[package]
name = "lumen-integrations"
version = "0.1.0"
edition = "2024"

[dependencies]
eventsource-stream = "0.2"
futures-util = "0.3"
lumen-core = { path = "../lumen-core" }
reqwest = { version = "0.13", default-features = false, features = ["json", "stream", "rustls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
tokio-util = "0.7"
url = "2"

[dev-dependencies]
wiremock = "0.6"
